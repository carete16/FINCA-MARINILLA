<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Finca en Venta Marinilla | 7.000 m² - $1.080M</title>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

/* ====== CSS COMPLETO ====== */
:root {
    --primary: #2D5A27;
    --secondary: #D4AF37;
    --text: #1A1A1A;
    --text-light: #666;
    --white: #ffffff;
    --bg: #fdfdfd;
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Outfit', sans-serif;
    background: var(--bg);
    color: var(--text);
}

/* HEADER */
header {
    position: fixed;
    width: 100%;
    top: 0;
    background: rgba(255,255,255,0.9);
    z-index: 1000;
}

nav {
    display: flex;
    justify-content: space-between;
    padding: 15px 30px;
}

.logo {
    font-weight: 700;
    color: var(--primary);
}

/* HERO */
.hero {
    height: 100vh;
    background: url('input_file_4.jpg') center/cover no-repeat;
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
    color: white;
}

.hero-content {
    background: rgba(0,0,0,0.5);
    padding: 30px;
    border-radius: 20px;
}

.hero h1 {
    font-size: 2.5rem;
}

/* PRECIO */
.price-box {
    background: white;
    color: black;
    padding: 20px;
    border-radius: 15px;
    margin-top: 20px;
}

.price-value {
    font-size: 2rem;
    color: var(--primary);
}

/* SECCIONES */
section {
    padding: 60px 20px;
    text-align: center;
}

#galeria img {
    width: 100%;
    margin-top: 10px;
    border-radius: 10px;
}

/* BOTON */
.btn {
    display: inline-block;
    background: #25D366;
    color: white;
    padding: 15px;
    margin-top: 20px;
    border-radius: 10px;
    text-decoration: none;
}

/* MOBILE */
@media (max-width:768px){
    .hero h1{
        font-size:1.5rem;
    }
}

</style>
</head>

<body>

<header>
<nav>
<div class="logo">MARINILLA PREMIUM</div>
</nav>
</header>

<section class="hero">
<div class="hero-content">
<h1>Finca en Marinilla cerca al Peñol</h1>
<p>7.000 m² - Alta valorización</p>

<div class="price-box">
<span>Precio</span>
<h2 class="price-value">$1.080.000.000</h2>
</div>

</div>
</section>

<section>
<h2>Características</h2>
<ul>
<li>7.000 m²</li>
<li>Casa en construcción</li>
<li>Casa mayordomo</li>
<li>Zona turística</li>
</ul>
</section>

<section id="galeria">
<h2>Galería</h2>

<img src="input_file_4.jpg">
<img src="input_file_0.jpg">
<img src="input_file_1.jpg">
<img src="input_file_2.jpg">
<img src="input_file_3.jpg">

</section>

<section>
<h2>Ubicación</h2>

<iframe src="https://www.google.com/maps?q=6.215836,-75.257945&output=embed" width="100%" height="300"></iframe>

</section>

<section>
<h2>Contacto</h2>

<a class="btn" href="https://wa.me/573012722472" target="_blank">
WhatsApp
</a>

</section>

</body>
</html>
